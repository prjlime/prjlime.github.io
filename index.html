<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heptocc</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #E7D27C, #7A1D1D); 
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-family: 'Times New Roman', Times, serif; 
            font-style: italic; 
            font-size: 6.5rem; 
            margin-bottom: 0px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ADEBB3, #CCCCFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block; 
            filter: drop-shadow(3px 5px 8px rgba(0, 0, 0, 0.5));
            
            /* Sped up from 0.3s to 0.15s for a very quick, snappy fade */
            transition: transform 0.15s ease-in-out, filter 0.15s ease-in-out;
            cursor: pointer; 
        }

        /* --- UPDATED FAST HOVER --- */
        h1:hover {
            transform: scale(1.18); /* Increased from 1.08 to 1.18 so it gets even bigger */
            background: linear-gradient(45deg, #ffffff, #ADEBB3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Added brightness(1.3) to pump up the color intensity on hover */
            filter: brightness(1.3) drop-shadow(5px 8px 15px rgba(0, 0, 0, 0.6));
        }

        p {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif; 
            font-style: normal; 
            font-size: 1.2rem;
            color: #f0f0f5; 
            margin-top: 15px;
            letter-spacing: 1px;
            font-weight: bold; 
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>heptocc</h1>
        <p>the gates to heptocc are awaiting construction</p>
    </div>
</body>
</html>
