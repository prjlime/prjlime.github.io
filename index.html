<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lime juice [by heptocc]</title>
    <style>
        /* 1. RESET AND MAIN HUB LAYOUT */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0b0d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* 2. THE UBISOFT-STYLE INTRO OVERLAY */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ffffff 0%, #a2e4b8 100%);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            /* Slide up exit animation */
            animation: slideUpOut 0.8s cubic-bezier(0.85, 0, 0.15, 1) forwards;
            animation-delay: 4.2s; 
        }

        /* 3. CORE LOGO REVEAL & GLITCH EFFECTS */
        .logo-container {
            position: relative;
            text-align: center;
            /* Scale up entrance simulation */
            animation: logoScale 3.5s ease-out forwards;
        }

        /* Fixed to exactly 300px per your preference */
        .logo-img {
            max-width: 300px;
            width: 75vw;
            height: auto;
            opacity: 0;
            display: block;
            margin: 0 auto;
            animation: fadeInReveal 1.5s ease-in-out forwards;
            animation-delay: 0.8s;
        }

        /* Signature horizontal laser sweep adjusted for 300px frame width */
        .scan-line {
            position: absolute;
            top: 50%;
            left: -15%;
            width: 130%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #adebb3, #ffffff, #98ff98, transparent);
            box-shadow: 0 0 20px #98ff98, 0 0 40px #adebb3;
            transform: scaleX(0);
            z-index: 2;
            animation: laserSweep 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.5s;
        }

        /* Soft ambient environment flare */
        .ambient-glow {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(152, 255, 152, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0;
            animation: glowPulse 3s ease-in-out forwards;
            animation-delay: 0.3s;
        }

        /* 4. ANIMATION TIMELINES (KEYFRAMES) */
        @keyframes laserSweep {
            0% { transform: scaleX(0); left: -15%; opacity: 1; }
            40% { transform: scaleX(1); }
            70% { transform: scaleX(1); left: 115%; opacity: 1; }
            100% { transform: scaleX(0); left: 125%; opacity: 0; }
        }

        @keyframes fadeInReveal {
            0% { opacity: 0; filter: blur(15px) drop-shadow(0 0 0px #fff); }
            50% { opacity: 0.8; filter: blur(3px) drop-shadow(0 0 15px rgba(173,235,179,0.6)); }
            100% { opacity: 1; filter: blur(0) drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
        }

        @keyframes logoScale {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.03); }
        }

        @keyframes glowPulse {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.3; transform: scale(1); }
        }

        @keyframes slideUpOut {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100%); visibility: hidden; }
        }

        /* 5. ACTUAL MAIN LANDING PAGE STYLING */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f1015;
        }
        .content-box {
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <!-- THE INTRO SCREEN OVERLAY -->
    <div id="splash-screen">
        <div class="ambient-glow"></div>
        <div class="logo-container">
            <div class="scan-line"></div>
            <img class="logo-img" src="logo.png" alt="Studio Logo">
        </div>
    </div>

    <!-- YOUR REAL LANDING PAGE CONTENT (Reveals safely behind it) -->
    <div class="main-content">
        <div class="content-box">
            <h2>lime juice</h2>
            <p>a project by</p>
            <p>[[heptocc]]</p>
        </div>
    </div>

</body>
</html>
