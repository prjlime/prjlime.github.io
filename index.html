<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE ROBUX GENERATOR 2026!!!</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: "Comic Sans MS", sans-serif;
            text-align: center;
            padding-top: 50px;
            margin: 0;
            overflow: hidden; /* Prevents scrolling if the trap is active */
        }
        .box {
            background: #2a2a2a;
            border: 3px dashed #ff00ff;
            padding: 30px;
            display: inline-block;
            border-radius: 15px;
        }
        input {

            margin: 10px;

        }
        h1 {

            text-shadow: 2px 2px #ff0000;

        /* THE TRAP OVERLAY (Hidden by default) */
        #trap-overlay {
            display: none; /* Starts invisible */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.95); /* Blackout background */
            z-index: 9999; /* Puts it on top of absolutely everything */
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        iframe {
            border: 5px solid #ff0000;
            box-shadow: 0px 0px 50px #ff0000;
            width: 80%;
            height: 70%;
        }
        .trap-text {
            color: #ff0000;
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 20px;
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>🔥 FREE ROBUX INFINITE GLITCH 2026 🔥</h1>

    <div class="box">

        <br>
        <input type="password" placeholder="Password" onkeydown="triggerTrap()">
    </div>

    <div id="trap-overlay">
        <div class="trap-text">❌ USER VERIFICATION FAILED: YOU GOT RICKROLLED ❌</div>
        <iframe id="rick-video" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <script>
        function triggerTrap() {
            // 1. Show the giant overlay layout
