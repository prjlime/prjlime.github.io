<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heaven</title>
    <!-- Tab icon link -->
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #E7D27C, #7A1D1D);
            text-align: center;
            overflow: hidden;
        }
        .container {
            position: relative;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* --- POSITIONED TO THE TOP LEFT CORNER --- */
        .orb-background {
            position: absolute;
            z-index: 1;
            width: 260px;
            height: auto;
            opacity: 0.85;
            filter: drop-shadow(0px 0px 20px rgba(173, 235, 179, 0.4));
            pointer-events: none;
            
            /* Pushes the pearl cleanly into the top left of the screen */
            top: 40px;
            left: 40px;
            
            animation: cornerPulse 4s ease-in-out infinite;
        }
        
        @keyframes cornerPulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 0.95; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        
        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
            font-size: 6.5rem;
            margin: 0;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ADEBB3, #CCCCFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            position: relative;
            z-index: 2;
            filter: drop-shadow(3px 5px 8px rgba(0, 0, 0, 0.5));
            transition: transform 0.15s ease-in-out, filter 0.15s ease-in-out;
            cursor: pointer;
        }
        h1:hover {
            transform: scale(1.18);
            background: linear-gradient(45deg, #ffffff, #ADEBB3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: brightness(1.3) drop-shadow(5px 8px 15px rgba(0, 0, 0, 0.6));
        }
        p {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
            font-style: normal;
            font-size: 1.2rem;
            color: #f0f0f5;
            margin-top: 15px;
            letter-spacing: 1px;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>
    <!-- The pearl image coordinates off the top-left of the viewport -->
    <img src="favicon.png" alt="" class="orb-background">

    <div class="container">
        <h1>heptocc</h1>
        <p>the gates to heaven are awaiting construction</p>
    </div>
</body>
</html>
