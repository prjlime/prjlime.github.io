<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heptocc</title>
    <!-- Imports Bebas Neue and Montserrat from Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Background now transforms from the old body text gold (#E7D27C) into a dark red (#7A1D1D) */
            background: linear-gradient(135deg, #E7D27C, #7A1D1D); 
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif; 
            font-style: italic; 
            font-size: 5.5rem; 
            margin-bottom: 0px;
            letter-spacing: 2px;
            text-transform: uppercase; 
            background: linear-gradient(45deg, #ADEBB3, #CCCCFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Pronounced text drop shadow to separate the title from the new background */
            filter: drop-shadow(3px 5px 8px rgba(0, 0, 0, 0.5));
        }
        p {
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.1rem;
            /* Body text color swapped with a darkened version of the old background (#AC9D8E -> #4A3E33) */
            color: #4A3E33; 
            margin-top: 5px;
            letter-spacing: 1px;
            font-weight: bold; 
            /* Added a text drop shadow here too for clean readability */
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>heptocc</h1>
        <p>the gates to heptocc are awaiting construction</p>
    </div>
</body>
</html>
